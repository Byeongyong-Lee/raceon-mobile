<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Head -->
  <circle cx="70" cy="16" r="9.5" fill="white"/>

  <!-- Torso (leaning ~20° forward) -->
  <line x1="65" y1="25" x2="53" y2="54"
        stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Right arm — raised back -->
  <line x1="62" y1="35" x2="79" y2="21"
        stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Left arm — swinging forward -->
  <line x1="60" y1="37" x2="40" y2="53"
        stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Right leg — back, bent at knee -->
  <line x1="55" y1="55" x2="68" y2="41"
        stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="68" y1="41" x2="78" y2="60"
        stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Left leg — front, extended -->
  <line x1="53" y1="57" x2="34" y2="74"
        stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="34" y1="74" x2="22" y2="88"
        stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Speed / motion lines -->
  <line x1="5"  y1="46" x2="27" y2="46"
        stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <line x1="3"  y1="57" x2="22" y2="57"
        stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <line x1="7"  y1="67" x2="21" y2="67"
        stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.30"/>
</svg>
