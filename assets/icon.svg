<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="main">
      <rect x="0" y="0" width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="#FF8C00"/>

  <!-- 사선 텍스처 라인 -->
  <line x1="0" y1="820" x2="768" y2="0"  stroke="white" stroke-width="4" opacity="0.07" clip-path="url(#main)"/>
  <line x1="0" y1="1000" x2="1000" y2="0" stroke="white" stroke-width="4" opacity="0.07" clip-path="url(#main)"/>
  <line x1="100" y1="1024" x2="1024" y2="100" stroke="white" stroke-width="4" opacity="0.05" clip-path="url(#main)"/>
  <line x1="0" y1="620" x2="620" y2="0"  stroke="white" stroke-width="4" opacity="0.05" clip-path="url(#main)"/>

  <!-- RO 메인 텍스트 -->
  <text x="512" y="560"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="480"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-28">RO</text>

  <!-- 하단 구분선 -->
  <line x1="112" y1="748" x2="912" y2="748" stroke="white" stroke-width="3" opacity="0.35"/>

  <!-- RACE ON 서브텍스트 -->
  <text x="512" y="840"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="72"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="36"
    opacity="0.85">RACE ON</text>
</svg>
